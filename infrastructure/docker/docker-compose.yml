services:
  postgres:
    image: postgres:16-alpine
    container_name: trp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trp
      POSTGRES_PASSWORD: trp
      POSTGRES_DB: trp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trp -d trp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
