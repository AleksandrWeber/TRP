name: Release Candidate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_git:
        description: Skip local git commit/tag inside RC-2 pipeline
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  release:
    name: RC Release Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trp
          POSTGRES_PASSWORD: trp
          POSTGRES_DB: trp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trp -d trp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      RELEASE_SKIP_GIT: ${{ github.event_name == 'push' && '1' || github.event.inputs.skip_git || '1' }}
      DATABASE_URL: postgresql://trp:trp@localhost:5432/trp?schema=public
      JWT_SECRET: ci-only-jwt-secret-value-32chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @trp/research build

      - name: Run RC-2 release pipeline
        run: pnpm release:validate
        continue-on-error: false

      - name: Package release artifacts
        if: always()
        run: bash .github/scripts/release/package-artifacts.sh

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: |
            docs/releases/**
            .github/reports/release/**

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Trading Platform ${{ github.ref_name }}
          body_path: docs/releases/RC-1-RELEASE-NOTES.md
          files: |
            docs/releases/RC-1-CERTIFICATION.md
            docs/releases/RC-1-RELEASE-NOTES.md
            docs/releases/rc-1/architecture-conformance.md
            docs/releases/rc-1/test-report.md
            docs/releases/rc-1/performance.md
            docs/releases/rc-1/security.md
            docs/releases/rc-1/documentation.md
            docs/releases/rc-1/smoke-test.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional Docker scaffolding (disabled by default)
      - name: Docker build (optional scaffold)
        if: false
        run: bash .github/scripts/release/docker-build.sh
